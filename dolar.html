<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Basic document-level hardening that still works in a static-only deployment. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://mercados.ambito.com; style-src 'self'; script-src 'self'; img-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'; upgrade-insecure-requests">
    <meta name="referrer" content="no-referrer">
    <title>Dolar hoy</title>
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Dolar hoy</h2>
    <h3>(Datos de Ámbito Financiero)</h3>
    <!-- Live status text for refresh progress and partial/total fetch failures. -->
    <p id="status-message" role="status" aria-live="polite"></p>
    <table>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Compra</th>
                <th>Venta</th>
                <th>Fecha</th>
                <th>Variación</th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <!-- Link to the external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
